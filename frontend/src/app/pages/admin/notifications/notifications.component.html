<h2>Notifications</h2>

<div class="grid grid-2">
  <form class="card" (ngSubmit)="send()">
    <h3>Send Notification</h3>
    <div class="form-group">
      <label for="title">Title</label>
      <input id="title" name="title" [(ngModel)]="form.title" placeholder="Notification title" />
    </div>
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="3" [(ngModel)]="form.message" placeholder="Notification message"></textarea>
    </div>
    <div class="form-group">
      <label for="audience">Audience</label>
      <select id="audience" name="audience" [(ngModel)]="form.audience">
        <option value="all">All Employees</option>
        <option *ngFor="let e of employees" [value]="e.id">{{ e.name }}</option>
      </select>
    </div>
    <button class="btn btn-primary" type="submit" [disabled]="sending">
      {{ sending ? 'Sending...' : 'Send Notification' }}
    </button>
  </form>

  <div class="card">
    <h3>Sent Notifications</h3>
    <app-spinner *ngIf="loading" label="Loading notifications..."></app-spinner>
    <ul class="notif-list" *ngIf="!loading">
      <li *ngFor="let n of notifications">
        <strong>{{ n.title }}</strong>
        <p>{{ n.message }}</p>
        <span class="muted">{{ n.createdOn | date:'medium' }} · {{ n.audience === 'all' ? 'All Employees' : n.audience }}</span>
      </li>
      <li *ngIf="!notifications.length" class="muted">No notifications sent yet.</li>
    </ul>
  </div>
</div>
