<h2>Add New Activity</h2>

<form class="card activity-form" (ngSubmit)="submit()">
  <div class="grid grid-2">
    <div class="form-group">
      <label for="title">Title *</label>
      <input id="title" name="title" [(ngModel)]="form.title" placeholder="e.g. Community Beach Clean-Up" />
    </div>
    <div class="form-group">
      <label for="ngo">NGO Partner *</label>
      <select id="ngo" name="ngo" [(ngModel)]="form.ngoId" (ngModelChange)="onNgoChange()">
        <option value="" disabled>Select an NGO</option>
        <option *ngFor="let n of ngos" [value]="n.id">{{ n.name }}</option>
      </select>
    </div>
  </div>

  <div class="grid grid-2">
    <div class="form-group">
      <label for="category">Category *</label>
      <input id="category" name="category" [(ngModel)]="form.category" placeholder="e.g. Environment" />
    </div>
    <div class="form-group">
      <label for="location">Location *</label>
      <input id="location" name="location" [(ngModel)]="form.location" placeholder="Venue / address" />
    </div>
  </div>

  <div class="form-group">
    <label for="description">Description *</label>
    <textarea id="description" name="description" rows="3" [(ngModel)]="form.description"></textarea>
  </div>

  <div class="grid grid-3">
    <div class="form-group">
      <label for="date">Date *</label>
      <input id="date" name="date" type="date" [(ngModel)]="form.date" />
    </div>
    <div class="form-group">
      <label for="startTime">Start Time *</label>
      <input id="startTime" name="startTime" type="time" [(ngModel)]="form.startTime" />
    </div>
    <div class="form-group">
      <label for="endTime">End Time *</label>
      <input id="endTime" name="endTime" type="time" [(ngModel)]="form.endTime" />
    </div>
  </div>

  <div class="grid grid-2">
    <div class="form-group">
      <label for="totalSlots">Total Slots *</label>
      <input id="totalSlots" name="totalSlots" type="number" min="1" [(ngModel)]="form.totalSlots" />
    </div>
    <div class="form-group">
      <label for="cutoff">Registration Cutoff (hours before start) *</label>
      <input id="cutoff" name="cutoff" type="number" min="0" [(ngModel)]="form.registrationCutoffHours" />
    </div>
  </div>

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div class="form-actions">
    <a class="btn btn-outline" routerLink="/admin/manage-activities">Cancel</a>
    <button class="btn btn-primary" type="submit" [disabled]="submitting">
      {{ submitting ? 'Saving...' : 'Create Activity' }}
    </button>
  </div>
</form>
