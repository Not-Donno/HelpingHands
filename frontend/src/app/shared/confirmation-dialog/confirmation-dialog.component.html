<div class="overlay" *ngIf="visible">
  <div class="dialog card">
    <h3>{{ title }}</h3>
    <p>{{ message }}</p>
    <div class="dialog-actions">
      <button class="btn btn-outline" (click)="cancelled.emit()">{{ cancelLabel }}</button>
      <button class="btn btn-danger" (click)="confirmed.emit()">{{ confirmLabel }}</button>
    </div>
  </div>
</div>
