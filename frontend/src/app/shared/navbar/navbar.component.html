<header class="navbar">
  <div class="brand" [routerLink]="(user$ | async)?.role === 'admin' ? '/admin/dashboard' : '/employee/dashboard'">
    <span class="brand-mark"><i class="bi bi-shield-check"></i></span>
    <span class="brand-name">HelpingHands</span>
  </div>

  <div class="navbar-right" *ngIf="user$ | async as user">
    <div class="user-info">
      <span class="user-avatar">{{ user.name.charAt(0) }}</span>
      <span class="user-text">
        <span class="user-name">{{ user.name }}</span>
        <span class="role-chip">{{ user.role }}</span>
      </span>
    </div>
    <button class="btn btn-outline" (click)="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
  </div>
</header>
